<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏 - Snake Game Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-wrapper {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 100%;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            font-weight: 700;
        }

        .scores {
            display: flex;
            gap: 20px;
            font-size: 18px;
            font-weight: 600;
        }

        .score-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            min-width: 120px;
            text-align: center;
        }

        .score-label {
            font-size: 12px;
            opacity: 0.9;
            margin-right: 5px;
        }

        #game-container {
            position: relative;
            width: min(90vw, 80vmin);
            height: min(90vw, 80vmin);
            max-width: 600px;
            max-height: 600px;
            margin: 0 auto;
        }

        #game-canvas {
            background: #1a1a2e;
            border-radius: 10px;
            display: block;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.95);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 48px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .controls-info {
            margin-top: 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .controls-info kbd {
            background: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 2px 6px;
            font-family: monospace;
            font-size: 12px;
        }

        .fps-counter {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #0f0;
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            z-index: 5;
        }

        .game-over-score {
            font-size: 24px;
            margin: 20px 0;
        }

        .new-high-score {
            color: #ffd700;
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .pause-text {
            font-size: 36px;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-header">
            <h1>🐍 贪吃蛇</h1>
            <div class="scores">
                <div class="score-item">
                    <span class="score-label">分数</span>
                    <span id="score">0</span>
                </div>
                <div class="score-item">
                    <span class="score-label">最高分</span>
                    <span id="high-score">0</span>
                </div>
            </div>
        </div>

        <div id="game-container" role="application" aria-label="贪吃蛇游戏">
            <canvas id="game-canvas"></canvas>

            <!-- Start Screen -->
            <div id="start-screen" class="overlay">
                <h2>贪吃蛇</h2>
                <p>使用方向键或WASD控制蛇移动</p>
                <button class="btn" onclick="startGame()">开始游戏</button>
            </div>

            <!-- Game Over Screen -->
            <div id="game-over-screen" class="overlay hidden">
                <h2>游戏结束</h2>
                <div class="game-over-score">
                    得分: <span id="final-score">0</span>
                </div>
                <p id="high-score-message"></p>
                <button class="btn" onclick="restartGame()">重新开始</button>
            </div>

            <!-- Pause Screen -->
            <div id="pause-screen" class="overlay hidden">
                <h2 class="pause-text">PAUSED</h2>
                <p>按 <kbd>Esc</kbd> 或 <kbd>P</kbd> 继续</p>
                <button class="btn" onclick="resumeGame()">继续游戏</button>
            </div>

            <div class="fps-counter" id="fps-counter">FPS: 60</div>
        </div>

        <div class="controls-info">
            <p>控制: <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> | 暂停: <kbd>Esc</kbd> 或 <kbd>P</kbd></p>
        </div>
    </div>

    <script>
        // Game Constants
        const GRID_SIZE = 20;
        const CELL_SIZE = 20;
        const INITIAL_SPEED = 150; // ms per move
        const SPEED_INCREMENT = 2; // ms faster per food
        const MIN_SPEED = 50; // fastest speed
        const FOOD_SCORE = 10;

        // Game State
        let canvas, ctx;
        let gameState = 'start'; // start, playing, paused, gameover
        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = 0;
        let gameSpeed = INITIAL_SPEED;
        let lastMoveTime = 0;
        let animationFrameId = null;
        let fps = 60;
        let lastFpsUpdate = 0;
        let frameCount = 0;

        // Initialize
        function init() {
            canvas = document.getElementById('game-canvas');
            ctx = canvas.getContext('2d');

            if (!ctx) {
                alert('您的浏览器不支持Canvas，请升级浏览器');
                return;
            }

            loadHighScore();
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            document.addEventListener('keydown', handleKeyDown);
            canvas.focus();
        }

        function resizeCanvas() {
            const container = document.getElementById('game-container');
            const size = Math.min(container.clientWidth, container.clientHeight);
            canvas.width = size;
            canvas.height = size;

            if (gameState === 'start' || gameState === 'gameover') {
                draw();
            }
        }

        function loadHighScore() {
            try {
                const saved = localStorage.getItem('snakeHighScore');
                if (saved !== null) {
                    highScore = parseInt(saved, 10);
                    document.getElementById('high-score').textContent = highScore;
                }
            } catch (e) {
                console.warn('localStorage not available:', e);
            }
        }

        function saveHighScore() {
            try {
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore.toString());
                    document.getElementById('high-score').textContent = highScore;
                    return true;
                }
            } catch (e) {
                console.warn('Failed to save high score:', e);
            }
            return false;
        }

        function startGame() {
            gameState = 'playing';
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = INITIAL_SPEED;
            document.getElementById('score').textContent = score;

            generateFood();
            hideOverlays();
            lastMoveTime = performance.now();
            lastFpsUpdate = performance.now();
            frameCount = 0;

            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function restartGame() {
            startGame();
        }

        function pauseGame() {
            if (gameState === 'playing') {
                gameState = 'paused';
                document.getElementById('pause-screen').classList.remove('hidden');
            }
        }

        function resumeGame() {
            if (gameState === 'paused') {
                gameState = 'playing';
                document.getElementById('pause-screen').classList.add('hidden');
                lastMoveTime = performance.now();
            }
        }

        function hideOverlays() {
            document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
        }

        function showOverlay(id) {
            document.getElementById(id).classList.remove('hidden');
        }

        function handleKeyDown(e) {
            // Prevent default for game keys
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'KeyW', 'KeyA', 'KeyS', 'KeyD', 'Escape', 'KeyP'].includes(e.code)) {
                e.preventDefault();
            }

            // Pause/Resume
            if (e.code === 'Escape' || e.code === 'KeyP') {
                if (gameState === 'playing') {
                    pauseGame();
                } else if (gameState === 'paused') {
                    resumeGame();
                }
                return;
            }

            // Direction controls (only when playing)
            if (gameState !== 'playing') return;

            // Prevent 180-degree turns
            switch (e.code) {
                case 'ArrowUp':
                case 'KeyW':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 'KeyS':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'KeyA':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }

        function generateFood() {
            const gridCount = Math.floor(canvas.width / CELL_SIZE);
            let attempts = 0;
            const maxAttempts = 100;

            do {
                food.x = Math.floor(Math.random() * gridCount);
                food.y = Math.floor(Math.random() * gridCount);
                attempts++;
            } while (isOnSnake(food.x, food.y) && attempts < maxAttempts);

            // Fallback: find first empty position
            if (attempts >= maxAttempts) {
                for (let y = 0; y < gridCount; y++) {
                    for (let x = 0; x < gridCount; x++) {
                        if (!isOnSnake(x, y)) {
                            food.x = x;
                            food.y = y;
                            return;
                        }
                    }
                }
            }
        }

        function isOnSnake(x, y) {
            return snake.some(segment => segment.x === x && segment.y === y);
        }

        function update(currentTime) {
            if (gameState !== 'playing') return;

            // Control game speed
            if (currentTime - lastMoveTime < gameSpeed) return;
            lastMoveTime = currentTime;

            // Update direction
            direction = { ...nextDirection };

            // Calculate new head position
            const gridCount = Math.floor(canvas.width / CELL_SIZE);
            const newHead = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Check wall collision
            if (newHead.x < 0 || newHead.x >= gridCount ||
                newHead.y < 0 || newHead.y >= gridCount) {
                gameOver();
                return;
            }

            // Check self collision
            if (isOnSnake(newHead.x, newHead.y)) {
                gameOver();
                return;
            }

            // Add new head
            snake.unshift(newHead);

            // Check food collision
            if (newHead.x === food.x && newHead.y === food.y) {
                score += FOOD_SCORE;
                document.getElementById('score').textContent = score;

                // Increase speed
                gameSpeed = Math.max(MIN_SPEED, gameSpeed - SPEED_INCREMENT);

                generateFood();
            } else {
                // Remove tail if no food eaten
                snake.pop();
            }
        }

        function draw() {
            const gridCount = Math.floor(canvas.width / CELL_SIZE);

            // Clear canvas
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Calculate cell size with padding
            const padding = 2;
            const drawSize = (canvas.width / gridCount) - padding * 2;

            // Draw snake
            snake.forEach((segment, index) => {
                const x = segment.x * (canvas.width / gridCount) + padding;
                const y = segment.y * (canvas.height / gridCount) + padding;

                if (index === 0) {
                    // Snake head
                    ctx.fillStyle = '#667eea';
                } else {
                    // Snake body (gradient effect)
                    const gradient = 1 - (index / snake.length) * 0.5;
                    ctx.fillStyle = `rgba(118, 75, 162, ${gradient})`;
                }

                ctx.fillRect(x, y, drawSize, drawSize);

                // Add slight border for definition
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 1;
                ctx.strokeRect(x, y, drawSize, drawSize);
            });

            // Draw food
            const foodX = food.x * (canvas.width / gridCount) + padding;
            const foodY = food.y * (canvas.height / gridCount) + padding;

            // Pulsing effect for food
            const pulse = Math.sin(performance.now() / 200) * 0.2 + 0.8;
            ctx.fillStyle = `rgba(255, 107, 107, ${pulse})`;
            ctx.beginPath();
            ctx.arc(
                foodX + drawSize / 2,
                foodY + drawSize / 2,
                drawSize / 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // Food glow
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function updateFps(currentTime) {
            frameCount++;

            if (currentTime - lastFpsUpdate >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFpsUpdate = currentTime;
                document.getElementById('fps-counter').textContent = `FPS: ${fps}`;

                // Log warning if FPS is too low
                if (fps < 30) {
                    console.warn(`Low FPS detected: ${fps}`);
                }
            }
        }

        function gameLoop(currentTime) {
            update(currentTime);
            draw();
            updateFps(currentTime);

            if (gameState === 'playing' || gameState === 'paused') {
                animationFrameId = requestAnimationFrame(gameLoop);
            }
        }

        function gameOver() {
            gameState = 'gameover';

            const isNewHighScore = saveHighScore();

            document.getElementById('final-score').textContent = score;

            const highScoreMessage = document.getElementById('high-score-message');
            if (isNewHighScore) {
                highScoreMessage.innerHTML = '<span class="new-high-score">🎉 新纪录！</span>';
            } else {
                highScoreMessage.textContent = `历史最高分: ${highScore}`;
            }

            showOverlay('game-over-screen');
        }

        // Start initialization when page loads
        window.addEventListener('load', init);
    </script>
</body>
</html>
