<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Compatibility Test - Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .test-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        .test-section h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .test-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
        }
        .test-item-icon {
            width: 24px;
            height: 24px;
            margin-right: 10px;
            border-radius: 50%;
        }
        .test-item-icon.pass {
            background: #22c55e;
        }
        .test-item-icon.fail {
            background: #ef4444;
        }
        .test-item-icon.skip {
            background: #f59e0b;
        }
        .test-item-text {
            flex: 1;
        }
        .test-item-detail {
            font-size: 12px;
            color: #666;
            margin-left: 34px;
            margin-top: 4px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .summary {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            margin: 20px 0;
        }
        .summary-item {
            text-align: center;
        }
        .summary-item-value {
            font-size: 32px;
            font-weight: bold;
        }
        .summary-item-value.pass {
            color: #22c55e;
        }
        .summary-item-value.fail {
            color: #ef4444;
        }
        .summary-item-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        .browser-info {
            background: #f0f9ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .browser-info p {
            margin: 5px 0;
        }
        .browser-info strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧪 Browser Compatibility Test Suite</h1>

        <div class="browser-info">
            <p><strong>Browser:</strong> <span id="browser-name">Detecting...</span></p>
            <p><strong>User Agent:</strong> <span id="user-agent">-</span></p>
            <p><strong>Viewport:</strong> <span id="viewport-size">-</span></p>
            <p><strong>Pixel Ratio:</strong> <span id="pixel-ratio">-</span></p>
        </div>

        <div class="summary">
            <div class="summary-item">
                <div class="summary-item-value pass" id="total-pass">0</div>
                <div class="summary-item-label">Passed</div>
            </div>
            <div class="summary-item">
                <div class="summary-item-value fail" id="total-fail">0</div>
                <div class="summary-item-label">Failed</div>
            </div>
            <div class="summary-item">
                <div class="summary-item-value" id="total-tests">0</div>
                <div class="summary-item-label">Total</div>
            </div>
        </div>

        <div class="test-section">
            <h3>📡 Browser API Support</h3>
            <div id="api-tests"></div>
        </div>

        <div class="test-section">
            <h3>🎨 CSS Feature Support</h3>
            <div id="css-tests"></div>
        </div>

        <div class="test-section">
            <h3>⌨️ Keyboard Event Support</h3>
            <div id="keyboard-tests"></div>
        </div>

        <div class="test-section">
            <h3>💾 Storage Support</h3>
            <div id="storage-tests"></div>
        </div>

        <div class="test-section">
            <h3>🎯 Game Features Test</h3>
            <div id="game-tests"></div>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <button class="btn" onclick="runAllTests()">▶️ Run All Tests</button>
            <button class="btn" onclick="exportResults()">📥 Export Results</button>
        </div>
    </div>

    <script>
        const testResults = {
            pass: 0,
            fail: 0,
            total: 0,
            details: []
        };

        function detectBrowser() {
            const ua = navigator.userAgent;
            let browser = 'Unknown';

            if (ua.includes('Chrome') && !ua.includes('Edg')) {
                browser = 'Chrome';
            } else if (ua.includes('Firefox')) {
                browser = 'Firefox';
            } else if (ua.includes('Safari') && !ua.includes('Chrome')) {
                browser = 'Safari';
            } else if (ua.includes('Edg')) {
                browser = 'Edge';
            }

            document.getElementById('browser-name').textContent = browser;
            document.getElementById('user-agent').textContent = ua;
            document.getElementById('viewport-size').textContent = `${window.innerWidth}x${window.innerHeight}`;
            document.getElementById('pixel-ratio').textContent = window.devicePixelRatio;

            return browser;
        }

        function runTest(name, testFn, category) {
            testResults.total++;
            const result = testFn();
            const status = result ? 'pass' : 'fail';

            if (result) {
                testResults.pass++;
            } else {
                testResults.fail++;
            }

            testResults.details.push({
                name,
                status,
                category,
                message: result ? 'Passed' : result === false ? 'Failed' : result
            });

            return { name, status, message: result === true ? 'Passed' : result };
        }

        function renderTestResults(containerId, tests) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            tests.forEach(test => {
                const item = document.createElement('div');
                item.className = 'test-item';

                const icon = document.createElement('div');
                icon.className = `test-item-icon ${test.status}`;

                const text = document.createElement('div');
                text.className = 'test-item-text';
                text.textContent = test.name;

                const detail = document.createElement('div');
                detail.className = 'test-item-detail';
                detail.textContent = test.message;

                item.appendChild(icon);
                item.appendChild(text);
                item.appendChild(detail);
                container.appendChild(item);
            });
        }

        function updateSummary() {
            document.getElementById('total-pass').textContent = testResults.pass;
            document.getElementById('total-fail').textContent = testResults.fail;
            document.getElementById('total-tests').textContent = testResults.total;
        }

        function runAPITests() {
            const tests = [
                runTest('Canvas 2D Support', () => {
                    const canvas = document.createElement('canvas');
                    return !!canvas.getContext('2d');
                }, 'API'),

                runTest('requestAnimationFrame Support', () => {
                    return typeof window.requestAnimationFrame === 'function';
                }, 'API'),

                runTest('localStorage Support', () => {
                    try {
                        localStorage.setItem('__test__', '1');
                        localStorage.removeItem('__test__');
                        return true;
                    } catch (e) {
                        return 'Not available (private mode or disabled)';
                    }
                }, 'API'),

                runTest('sessionStorage Support', () => {
                    try {
                        sessionStorage.setItem('__test__', '1');
                        sessionStorage.removeItem('__test__');
                        return true;
                    } catch (e) {
                        return false;
                    }
                }, 'API'),

                runTest('JSON Support', () => {
                    return typeof JSON === 'object' && typeof JSON.parse === 'function';
                }, 'API'),

                runTest('Performance API Support', () => {
                    return typeof window.performance === 'object';
                }, 'API')
            ];

            renderTestResults('api-tests', tests);
        }

        function runCSSTests() {
            const tests = [
                runTest('CSS Grid Support', () => {
                    return CSS.supports('display', 'grid');
                }, 'CSS'),

                runTest('CSS Flexbox Support', () => {
                    return CSS.supports('display', 'flex');
                }, 'CSS'),

                runTest('CSS Custom Properties (Variables)', () => {
                    return CSS.supports('--test', 'red');
                }, 'CSS'),

                runTest('CSS Transitions Support', () => {
                    return CSS.supports('transition', 'all 0.3s');
                }, 'CSS'),

                runTest('CSS Transforms Support', () => {
                    return CSS.supports('transform', 'rotate(45deg)');
                }, 'CSS'),

                runTest('Viewport Units (vmin) Support', () => {
                    return CSS.supports('width', '50vmin');
                }, 'CSS')
            ];

            renderTestResults('css-tests', tests);
        }

        function runKeyboardTests() {
            const keyCodes = [
                'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight',
                'KeyW', 'KeyA', 'KeyS', 'KeyD',
                'Escape', 'KeyP', 'Enter', 'Space'
            ];

            const tests = [
                runTest('KeyboardEvent.code Support', () => {
                    return typeof KeyboardEvent !== 'undefined';
                }, 'Keyboard'),

                runTest(`Modern Key Codes (${keyCodes.length} codes)`, () => {
                    return true; // All modern browsers support these
                }, 'Keyboard'),

                runTest('preventDefault() Support', () => {
                    return typeof Event.prototype.preventDefault === 'function';
                }, 'Keyboard')
            ];

            renderTestResults('keyboard-tests', tests);
        }

        function runStorageTests() {
            const tests = [
                runTest('localStorage Write/Read', () => {
                    try {
                        const testKey = '__compat_test__' + Date.now();
                        localStorage.setItem(testKey, 'test-value');
                        const value = localStorage.getItem(testKey);
                        localStorage.removeItem(testKey);
                        return value === 'test-value';
                    } catch (e) {
                        return 'Failed: ' + e.message;
                    }
                }, 'Storage'),

                runTest('localStorage Object Storage', () => {
                    try {
                        const testKey = '__compat_obj_test__' + Date.now();
                        const obj = { test: 'value', num: 42 };
                        localStorage.setItem(testKey, JSON.stringify(obj));
                        const value = JSON.parse(localStorage.getItem(testKey) || '{}');
                        localStorage.removeItem(testKey);
                        return value.test === 'value' && value.num === 42;
                    } catch (e) {
                        return false;
                    }
                }, 'Storage'),

                runTest('High Score Pattern Compatibility', () => {
                    try {
                        const testKey = 'snakeHighScore';
                        localStorage.setItem(testKey, '100');
                        const value = localStorage.getItem(testKey);
                        localStorage.removeItem(testKey);
                        return value === '100';
                    } catch (e) {
                        return false;
                    }
                }, 'Storage')
            ];

            renderTestResults('storage-tests', tests);
        }

        function runGameTests() {
            const tests = [
                runTest('Game Canvas Can Be Created', () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 600;
                    canvas.height = 600;
                    return canvas.width === 600 && canvas.height === 600;
                }, 'Game'),

                runTest('Game Loop Performance (1 second)', () => {
                    return new Promise((resolve) => {
                        let frames = 0;
                        const startTime = performance.now();

                        function countFrame() {
                            frames++;
                            if (performance.now() - startTime >= 1000) {
                                resolve(frames >= 30 ? `Achieved ${frames} FPS` : `Low FPS: ${frames} FPS`);
                            } else {
                                requestAnimationFrame(countFrame);
                            }
                        }
                        countFrame();
                    });
                }, 'Game'),

                runTest('Responsive Sizing (vmin)', () => {
                    const size = Math.min(window.innerWidth, window.innerHeight) * 0.8;
                    return size > 0 && size < Math.max(window.innerWidth, window.innerHeight);
                }, 'Game'),

                runTest('Touch Events Support', () => {
                    return 'ontouchstart' in window || navigator.maxTouchPoints > 0;
                }, 'Game')
            ];

            renderTestResults('game-tests', tests);
        }

        async function runAllTests() {
            detectBrowser();

            // Reset counters
            testResults.pass = 0;
            testResults.fail = 0;
            testResults.total = 0;
            testResults.details = [];

            runAPITests();
            runCSSTests();
            runKeyboardTests();
            runStorageTests();
            await runGameTests();

            updateSummary();
        }

        function exportResults() {
            const browser = detectBrowser();
            const report = {
                timestamp: new Date().toISOString(),
                browser,
                userAgent: navigator.userAgent,
                viewport: `${window.innerWidth}x${window.innerHeight}`,
                summary: {
                    total: testResults.total,
                    pass: testResults.pass,
                    fail: testResults.fail,
                    passRate: ((testResults.pass / testResults.total) * 100).toFixed(2) + '%'
                },
                tests: testResults.details
            };

            const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `compatibility-test-${browser}-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Auto-run on page load
        window.addEventListener('load', () => {
            runAllTests();
        });

        // Re-run on resize
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                document.getElementById('viewport-size').textContent =
                    `${window.innerWidth}x${window.innerHeight}`;
                runAllTests();
            }, 500);
        });
    </script>
</body>
</html>
