<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Snake Head Base -->
  <rect x="2" y="2" width="36" height="36" rx="4" fill="#4CAF50" stroke="#388E3C" stroke-width="2"/>

  <!-- Eyes (looking UP - default) -->
  <g id="eyes">
    <!-- Left Eye -->
    <rect x="8" y="8" width="6" height="6" fill="#FFFFFF"/>
    <rect x="9" y="9" width="3" height="3" fill="#000000"/>

    <!-- Right Eye -->
    <rect x="26" y="8" width="6" height="6" fill="#FFFFFF"/>
    <rect x="27" y="9" width="3" height="3" fill="#000000"/>
  </g>
</svg>