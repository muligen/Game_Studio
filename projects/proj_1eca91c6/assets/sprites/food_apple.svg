<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <g id="apple">
    <!-- Apple Body -->
    <circle cx="20" cy="22" r="14" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>

    <!-- Stem -->
    <rect x="19" y="6" width="2" height="10" fill="#8B4513"/>

    <!-- Leaf -->
    <ellipse cx="23" cy="10" rx="4" ry="2" fill="#4CAF50" transform="rotate(30 23 10)"/>

    <!-- Highlight -->
    <ellipse cx="14" cy="18" rx="3" ry="4" fill="#FFFFFF" opacity="0.3"/>
  </g>
</svg>